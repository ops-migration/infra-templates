AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Nested Stack - Application buckets

Parameters:
  Environment:
    Type: String

  BucketNames:
    Type: CommaDelimitedList
    Description: S3 bucket names (must be globally unique, comma-separated, no spaces)

Resources:
  S3Bucket0:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Select [0, !Ref BucketNames]    # ✅ Fixed
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Select [0, !Ref BucketNames]      # ✅ Fixed
        - Key: Environment
          Value: !Ref Environment

Outputs:
  S3BucketName0:
    Description: S3 Bucket 0 Name
    Value: !Ref S3Bucket0
    Export:
      Name: !Sub '${AWS::StackName}-S3BucketName0'

  S3BucketName1:                                   # ✅ Added missing output for Bucket1
    Description: S3 Bucket 1 Name
    Value: !Ref S3Bucket1
    Export:
      Name: !Sub '${AWS::StackName}-S3BucketName1'
